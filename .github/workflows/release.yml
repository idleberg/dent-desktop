name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact-name: darwin
          - os: windows-latest
            artifact-name: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: "2.9"

      - name: Install dependencies
        run: deno install

      - name: Bundle UI
        run: deno task bundle

      - name: Build desktop app
        run: deno desktop --all-targets --include=dist/bundle.js --output Dent main.ts

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          zip -r "dent-${{ steps.version.outputs.VERSION }}-darwin.zip" Dent.app LICENSE

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a "dent-${{ steps.version.outputs.VERSION }}-windows.zip" Dent/ LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dent-${{ matrix.artifact-name }}
          path: dent-*.zip

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dent-*.zip > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dent-*.zip
            SHA256SUMS
